<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Silvia Helena</title>
    
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- NAVBAR: estrutura padronizada, igual em todas as páginas -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="./index.html" class="navbar-brand">
                <img src="./assets/logo_site_silvia.png" alt="Logo Silvia Helena">
                <span class="font-logo">Silvia Helena</span>
            </a>
            <a href="./index.html" class="navbar-back">Voltar para Home</a>
        </div>
    </nav>

    <main>
        <section class="login-card">

            <div class="login-card-header">
                <h2 class="font-logo">Agende sua sessão</h2>
                <p>Entre com sua conta, crie um cadastro ou continue com Google.</p>
            </div>

            <!-- Formulários de Entrar e Criar conta lado a lado -->
            <div class="forms-grid">

                <form>
                    <h3>Entrar</h3>
                    <div class="form-group">
                        <label for="login-email">E-mail</label>
                        <input id="login-email" type="email" placeholder="seuemail@exemplo.com">
                    </div>
                    <div class="form-group">
                        <label for="login-senha">Senha</label>
                        <input id="login-senha" type="password" placeholder="Sua senha">
                    </div>
                    <button type="button" class="btn btn--primary">Entrar</button>
                </form>

                <form>
                    <h3>Criar conta</h3>
                    <div class="form-group">
                        <label for="cadastro-nome">Nome</label>
                        <input id="cadastro-nome" type="text" placeholder="Seu nome completo">
                    </div>
                    <div class="form-group">
                        <label for="cadastro-email">E-mail</label>
                        <input id="cadastro-email" type="email" placeholder="seuemail@exemplo.com">
                    </div>
                    <div class="form-group">
                        <label for="cadastro-senha">Senha</label>
                        <input id="cadastro-senha" type="password" placeholder="Crie uma senha">
                    </div>
                    <button type="button" class="btn btn--secondary">Criar conta</button>
                </form>

            </div>

            
            <div class="form-divider">ou</div>
            <button type="button" class="btn-google">
                
                <i class="fa-brands fa-google icon-google"></i>
                Continuar com Google
            </button>

        </section>
    </main>

</body>
</html>
