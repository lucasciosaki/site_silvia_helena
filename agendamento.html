<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agendamento - Terapeuta</title>
    <link rel="stylesheet" href="./src/agendamento.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="./assets/logo_site_silvia.png" alt="Logo do Terapeuta" class="logo-img">
            <span class="nome-terapeuta">Silvia Helena</span>
        </div>

        <nav class="nav-links">
            <a href="#">Menu</a>
            <a href="#">Sobre</a>
            <a href="#">Técnicas</a>
        </nav>

        <div class="cliente-area">
            <a href="#" class="btn-area-cliente">Area do Cliente</a>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Equilíbrio e Autoconhecimento</h1>
            <p>Agende sua sessão de Reiki ou Mapa Numerológico de forma simples e rápida.</p>
            <a href="#agendamento-completo" class="btn-scroll">Começar Agendamento</a>
            <a href="#agendamentos-marcados" class="btn-scroll">Ver agendamentos já marcados</a>
        </div>
    </section>


    <section id="agendamento-completo" class="agendamento-completo">
        <div class="calendario-box">
            <div class="mes-header">
                <button id="prev-mes">
                    < </button>
                        <h3 id="mes-ano-texto">Mês Ano</h3>
                        <button id="next-mes"> > </button>
            </div>
            <div class="dias-semana">
                <div>Dom</div>
                <div>Seg</div>
                <div>Ter</div>
                <div>Qua</div>
                <div>Qui</div>
                <div>Sex</div>
                <div>Sáb</div>
            </div>
            <div id="dias-grid" class="dias-grid"></div>
        </div>

        <div id="painel-horarios" class="horarios-box hidden">
            <h3>Horários para <span id="dia-selecionado">--</span></h3>
            <div id="lista-botoes-horas" class="grid-botoes-horas">
            </div>
            <div id="lista-botoes-horas" class="grid-botoes-horas"></div>

            <div id="confirmar-box" class="hidden">
                <!--<p>Digite seu nome para confirmar:</p>
                <input type="text" id="nome-cliente" placeholder="Seu nome completo"
                    style="width:100%; padding:10px; margin-bottom:10px;">-->
                <button id="btn-final" class="btn-confirmar">Finalizar Agendamento</button>
            </div>
        </div>

    </section>

    <section id="agendamentos-marcados" class="agendamentos-marcados">
        <h2>Agendamentos Marcados</h2>
        <div id="lista-agendamentos" class="lista-agendamentos"></div>
    </section>

    <script src="./agendamento.js"></script>
</body>

</html>
